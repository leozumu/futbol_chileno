name: Ejecución Automática Diaria

# 1. ¿Cuándo ocurre? (Trigger)
on:
  schedule:
    - cron: '0 0 * * *' # Esto significa: Todos los días a las 00:00 UTC
  workflow_dispatch:     # Esto te permite darle al botón "Run" manualmente

# 2. ¿Qué va a hacer? (Jobs)
jobs:
  ejecutar-script:
    runs-on: ubuntu-latest # Usa la última versión de Linux Ubuntu
    
    steps:
      - name: Descargar el código del repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías necesarias
        run: |
          pip install requests beautifulsoup4

      - name: Correr el script de Python
        run: python mi_script.py # Cambia esto por el nombre de tu archivo

      - name: Guardar los cambios en el repositorio
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Actualización automática de datos" || exit 0
          git push
